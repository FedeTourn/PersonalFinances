<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Egresos · Finanzas</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪙</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="profile.js"></script>
</head>
<body>

  <nav>
    <a href="index.html"    class="nav-link">Inicio</a>
    <a href="ingresos.html" class="nav-link">Ingresos</a>
    <a href="egresos.html"  class="nav-link act-expense">Egresos</a>
  </nav>

  <div class="list-header">
    <div class="list-title" style="color:var(--expense)">Egresos</div>
    <div class="list-sub" id="sub">Cargando…</div>
  </div>

  <div class="ops-list" id="list">
    <div class="loader">
      <span class="loader-dot"></span>
      <span class="loader-dot"></span>
      <span class="loader-dot"></span>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentProfile = null;

    const fmt = n => new Intl.NumberFormat('es-AR', {
      style: 'currency', currency: 'ARS',
      minimumFractionDigits: 2, maximumFractionDigits: 2
    }).format(n);

    const fmtDate = s => new Intl.DateTimeFormat('es-AR', {
      day: 'numeric', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    }).format(new Date(s));

    const esc = s => s
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');

    function toast(msg, type = 'ok') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type}`;
      requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function deleteOp(id) {
      if (!confirm('¿Eliminar este egreso?')) return;
      const { error } = await db.from('operations').delete().eq('id', id);
      if (error) {
        toast('No se pudo eliminar', 'err');
      } else {
        toast('Eliminado ✓');
        load();
      }
    }

    async function load() {
      const list = document.getElementById('list');
      const sub  = document.getElementById('sub');

      const { data, error } = await db
        .from('operations')
        .select('*')
        .eq('type', 'egreso')
        .eq('owner', currentProfile)
        .order('created_at', { ascending: false });

      if (error) {
        list.innerHTML = '<div class="empty"><div class="empty-text">Error al cargar los datos</div></div>';
        console.error(error);
        return;
      }

      const total = (data || []).reduce((s, op) => s + parseFloat(op.amount), 0);
      const n     = data.length;
      sub.innerHTML = n
        ? `${n} operación${n !== 1 ? 'es' : ''} · Total: <span class="hl">${fmt(total)}</span>`
        : 'Sin operaciones';

      if (!n) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🧾</div>
            <div class="empty-text">Sin egresos aún</div>
            <div class="empty-hint">Agregá uno desde la pantalla de inicio</div>
          </div>`;
        return;
      }

      list.innerHTML = data.map(op => `
        <div class="op-card">
          <div class="op-dot exp">↓</div>
          <div class="op-info">
            <div class="op-name">${esc(op.name)}</div>
            <div class="op-date">${fmtDate(op.created_at)}</div>
          </div>
          <div class="op-right">
            <span class="op-amount exp">${fmt(op.amount)}</span>
            <button class="del-btn" onclick="deleteOp('${op.id}')" title="Eliminar">✕</button>
          </div>
        </div>`
      ).join('');
    }

    requireProfile(name => {
      currentProfile = name;
      load();
    });
  </script>
</body>
</html>
