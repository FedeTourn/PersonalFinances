<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Finanzas Personales</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪙</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="profile.js"></script>
</head>
<body>

  <nav>
    <a href="index.html"    class="nav-link act-home">Inicio</a>
    <a href="ingresos.html" class="nav-link">Ingresos</a>
    <a href="egresos.html"  class="nav-link">Egresos</a>
  </nav>

  <div id="configWarn"></div>

  <!-- Balance hero -->
  <div class="balance-section">
    <div class="balance-glow" id="glow"></div>
    <div class="balance-eyebrow">Saldo actual</div>
    <div class="balance-amount zero" id="balAmt">
      <span class="loader-dot"></span>
      <span class="loader-dot"></span>
      <span class="loader-dot"></span>
    </div>
  </div>

  <!-- New operation form -->
  <div class="form-card">
    <div class="form-eyebrow">Nueva operación</div>

    <!-- Ingreso / Egreso toggle -->
    <div class="toggle-wrap">
      <div class="toggle-opt on"  id="optIn"  onclick="setType('ingreso')">↑ Ingreso</div>
      <div class="toggle-opt"     id="optEg"  onclick="setType('egreso')">↓ Egreso</div>
      <div class="toggle-thumb"   id="thumb"></div>
    </div>

    <div class="input-group">
      <label class="input-label" for="nameIn">Nombre</label>
      <input class="input-field" type="text" id="nameIn"
             placeholder="Ej: Sueldo, Supermercado…" autocomplete="off">
    </div>

    <div class="input-group">
      <label class="input-label" for="amtIn">Monto ($)</label>
      <input class="input-field" type="number" id="amtIn"
             placeholder="0.00" min="0" step="any" inputmode="decimal">
    </div>

    <button class="submit-btn" id="submitBtn" onclick="addOp()">Agregar ingreso</button>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    /* ── Init ─────────────────────────────────────── */
    const configured =
      SUPABASE_URL  !== 'https://TU_PROYECTO.supabase.co' &&
      SUPABASE_ANON_KEY !== 'TU_ANON_KEY_AQUI';

    if (!configured) {
      document.getElementById('configWarn').innerHTML =
        '<div class="config-warn">⚠️ Completá las credenciales en <code>config.js</code> para que la app funcione.</div>';
    }

    const db  = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let mode  = 'ingreso';
    let currentProfile = null;

    /* ── Format helpers ───────────────────────────── */
    const fmt = n => new Intl.NumberFormat('es-AR', {
      style: 'currency', currency: 'ARS',
      minimumFractionDigits: 2, maximumFractionDigits: 2
    }).format(n);

    /* ── Toast ────────────────────────────────────── */
    function toast(msg, type = 'ok') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type}`;
      requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
      setTimeout(() => t.classList.remove('show'), 3200);
    }

    /* ── Toggle ───────────────────────────────────── */
    function setType(t) {
      mode = t;
      const isIn  = t === 'ingreso';
      const thumb = document.getElementById('thumb');
      const btn   = document.getElementById('submitBtn');
      const field = document.getElementById('amtIn');

      document.getElementById('optIn').classList.toggle('on',  isIn);
      document.getElementById('optEg').classList.toggle('on', !isIn);
      thumb.classList.toggle('right', !isIn);

      btn.textContent = isIn ? 'Agregar ingreso' : 'Agregar egreso';
      btn.style.setProperty('--btn-bg', isIn ? 'var(--income)' : 'var(--expense)');

      const focusColor = isIn ? 'var(--income)'          : 'var(--expense)';
      const glowColor  = isIn ? 'rgba(16,214,124,.12)'   : 'rgba(255,69,69,.12)';
      document.documentElement.style.setProperty('--field-focus', focusColor);
      document.documentElement.style.setProperty('--field-glow',  glowColor);
    }

    /* ── Load balance ─────────────────────────────── */
    async function loadBalance() {
      const el   = document.getElementById('balAmt');
      const glow = document.getElementById('glow');

      const { data, error } = await db
        .from('operations')
        .select('amount, type')
        .eq('owner', currentProfile);

      if (error) {
        el.textContent = 'Error';
        console.error(error);
        return;
      }

      let bal = 0;
      (data || []).forEach(op =>
        bal += op.type === 'ingreso' ? +op.amount : -op.amount
      );

      el.textContent = fmt(bal);
      const cls = bal > 0 ? 'pos' : bal < 0 ? 'neg' : 'zero';
      el.className = `balance-amount ${cls}`;
      glow.style.background = bal > 0 ? 'var(--income)' : bal < 0 ? 'var(--expense)' : 'transparent';
    }

    /* ── Add operation ────────────────────────────── */
    async function addOp() {
      if (!configured) { toast('Configurá las credenciales primero', 'err'); return; }

      const name = document.getElementById('nameIn').value.trim();
      const amt  = parseFloat(document.getElementById('amtIn').value);
      const btn  = document.getElementById('submitBtn');

      if (!name)         { toast('Falta el nombre', 'err');      return; }
      if (!amt || amt <= 0) { toast('Monto inválido', 'err');    return; }

      btn.disabled    = true;
      btn.textContent = 'Guardando…';

      const { error } = await db
        .from('operations')
        .insert({ name, amount: amt, type: mode, owner: currentProfile });

      if (error) {
        toast('No se pudo guardar', 'err');
        console.error(error);
      } else {
        toast(`${mode === 'ingreso' ? 'Ingreso' : 'Egreso'} guardado ✓`);
        document.getElementById('nameIn').value = '';
        document.getElementById('amtIn').value  = '';
        document.getElementById('nameIn').focus();
        await loadBalance();
      }

      btn.disabled    = false;
      btn.textContent = mode === 'ingreso' ? 'Agregar ingreso' : 'Agregar egreso';
    }

    /* ── Enter key ────────────────────────────────── */
    document.querySelectorAll('.input-field').forEach(f =>
      f.addEventListener('keydown', e => e.key === 'Enter' && addOp())
    );

    /* ── Boot ─────────────────────────────────────── */
    if (configured) {
      requireProfile(name => {
        currentProfile = name;
        loadBalance();
      });
    } else {
      document.getElementById('balAmt').textContent = '—';
    }
  </script>
</body>
</html>
